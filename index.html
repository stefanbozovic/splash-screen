<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Splash Screens Collection</title>
  <style>
    :root {
      --bg: #0a0a12;
      --fg: #ffffff;
      --muted: rgba(233, 238, 247, .90);
      --glass: rgba(255, 255, 255, .12);
      --stroke: rgba(255, 255, 255, .24);
      --shadow: 0 18px 80px rgba(0, 0, 0, .55);
      --radius: 24px;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      height: 100%
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: radial-gradient(1200px 800px at 20% 20%, rgba(93, 134, 255, .40), transparent 60%),
        radial-gradient(900px 700px at 75% 25%, rgba(255, 92, 146, .38), transparent 55%),
        radial-gradient(1000px 900px at 55% 80%, rgba(0, 255, 214, .30), transparent 60%),
        var(--bg);
      color: var(--fg);
      overflow-x: hidden;
    }

    .card {
      width: 100%;
      height: 100%;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 255, 255, .12), rgba(255, 255, 255, .08));
      border: 1px solid var(--stroke);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      isolation: isolate;
    }

    .scene {
      opacity: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255, 255, 204, .2), transparent 55%), var(--fg);
    }

    /* Adjust other class properties for high contrast */
  </style>
</head>

<body>
  <div class="hud">
    <div class="chip">
      <b id="sceneIndex">01</b>
      <span id="sceneName">Aurora Sweep</span>
    </div>
    <div class="chip">
      <span class="kbd">Scroll</span>
      <span class="kbd">1–9 jump</span>
    </div>
  </div>

  <div class="stage" aria-hidden="false">
    <div class="card" role="region" aria-label="Splash Screens">
      <!-- Updated Scenes -->
    </div>
  </div>

  <script>
    // Add interactivity if needed
  </script>
</body>

</html>
